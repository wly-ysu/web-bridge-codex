adapter: web

git:
  max_diff_chars: 14000

context:
  enabled: true
  max_file_chars: 8000
  max_related_files: 8
  max_logs: 3
  max_log_chars: 12000

bridge:
  personal_mode: true
  allow_workspace_context: true

workflow:
  mode: web_first
  codex_role: executor
  web_lead_role: planner
  default_route_all_natural_language_to_web: true
  local_execution_prefix: "本地执行："
  require_web_plan_before_implementation: true
  route_user_corrections_to_web: true

web_lead:
  default_tool: route_to_web_lead
  fallback_tool: ask_pro_architect
  default_profile: balanced
  vague_requirement_profile: balanced
  complex_requirement_profile: deep_lite
  pro_profile: pro_deep

routing:
  default_non_execution_route: "web"
  codex_role: "executor"
  web_role: "tech_lead"
  auto_route_natural_language: true
  pro_budget_policy:
    estimated_weekly_quota: 100
    conserve_pro: true
    pro_only_for_2h_plus_problems: true
    prefer_gpt55_for_under_30min: true
    require_explicit_or_high_value_for_pro: true
    use_pro_for:
      - "2h_plus_deep_reasoning"
      - "patent_or_innovation_strategy"
      - "autonomous_driving_safety_critical_architecture"
      - "long_term_architecture_decision"
      - "multi_round_unresolved_failure"
      - "high_risk_final_review"
      - "cross_module_migration_strategy"
    avoid_pro_for:
      - "simple_question"
      - "normal_architecture"
      - "routine_review"
      - "ordinary_debug"
      - "formatting"
      - "small_code_change"
      - "under_30min_problem"

project:
  allowed_extensions:
    - ".cpp"
    - ".hpp"
    - ".cc"
    - ".cxx"
    - ".h"
    - ".cu"
    - ".cuh"
    - ".py"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".md"
    - ".txt"
    - "CMakeLists.txt"
  ignore_paths:
    - ".git"
    - "build"
    - "log"
    - "data"
    - "weights"
    - "__pycache__"
  sensitive_patterns:
    - "*.bag"
    - "*.pcd"

web_adapter:
  enabled: true
  base_url: "https://chatgpt.com"
  profile_dir: ".gptpro-browser"
  user_data_dir: ""
  executable_path: ""
  channel: "chrome"
  headless: false
  timeout_ms: 120000
  model_strategy:
    mode: "best_available"
    preferred_models:
      - "GPT-5.5 Pro"
      - "Pro extension"
      - "GPT-5.5"
    fallback_to_current_model: true
    fail_if_preferred_unavailable: false
  profiles:
    fast:
      description: "Simple questions and low-cost quick checks"
      preferred_models:
        - "GPT-5.5"
      thinking_level: "fast"
    balanced:
      description: "Default Tech Lead analysis for normal architecture and under-30min problems"
      preferred_models:
        - "GPT-5.5"
      thinking_level: "auto"
    deep_lite:
      description: "Complex but not Pro-first; prefer GPT-5.5"
      preferred_models:
        - "GPT-5.5"
        - "GPT-5.5 Pro"
        - "Pro extension"
      thinking_level: "deep"
    pro_deep:
      description: "2h+ high-value problems, prefer Pro quota"
      preferred_models:
        - "GPT-5.5 Pro"
        - "Pro extension"
        - "GPT-5.5"
      thinking_level: "deep"
    review:
      description: "Normal code review, prefer GPT-5.5"
      preferred_models:
        - "GPT-5.5"
      thinking_level: "balanced"
    pro_review:
      description: "Critical code review, prefer Pro"
      preferred_models:
        - "GPT-5.5 Pro"
        - "Pro extension"
        - "GPT-5.5"
      thinking_level: "deep"
    debug:
      description: "Normal debugging, prefer GPT-5.5"
      preferred_models:
        - "GPT-5.5"
      thinking_level: "balanced"
    pro_debug:
      description: "Multi-round failures and complex root-cause analysis, prefer Pro"
      preferred_models:
        - "GPT-5.5 Pro"
        - "Pro extension"
        - "GPT-5.5"
      thinking_level: "deep"
  input_selectors:
    - "#prompt-textarea"
    - "textarea[data-testid='composer-tray-text-input']"
    - "textarea[placeholder*='Message']"
    - "textarea[placeholder*='Send a message']"
    - "div[contenteditable='true']"
  send_selectors:
    - "button[data-testid='send-button']"
    - "button[data-testid='send-button-annotation']"
    - "button:has-text('Send')"
    - "button[aria-label='Send prompt']"
    - "button[aria-label='Send message']"
  response_selectors:
    - "[data-message-author-role='assistant']"
    - "article[data-message-author-role='assistant']"
    - "article[data-testid='conversation-turn-2']"
    - "div[data-testid='markdown']"
    - "article"

browser_tabs:
  cleanup_before_query: true
  cleanup_after_query: true
  keep_latest_chatgpt_tabs: 0
  close_about_blank: true
  close_chatgpt_tabs: true
  max_tabs_warning_threshold: 5

api_adapter:
  model: gpt-5.5-pro
  temperature: 0.2
  max_tokens: 4096
  request_timeout_seconds: 60
  response_wait_seconds: 60

runtime:
  tool_timeout_seconds: 180
  web_query_timeout_seconds: 150
  browser_launch_timeout_seconds: 45
  auto_kill_stale_ai_chrome: false
  auto_remove_stale_lock: false

memory_file: ".bridge_memory.json"
