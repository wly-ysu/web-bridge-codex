schema_version: 2
adapter: web

git:
  max_diff_chars: 14000

context:
  enabled: true
  max_file_chars: 8000
  max_related_files: 8
  max_logs: 3
  max_log_chars: 12000

bridge:
  personal_mode: true
  allow_workspace_context: true

workflow:
  mode: web_first
  codex_role: executor
  web_lead_role: planner
  default_route_all_natural_language_to_web: true
  local_execution_prefix: "本地执行："
  require_web_plan_before_implementation: true
  route_user_corrections_to_web: true

web_lead:
  default_tool: route_to_web_lead
  fallback_tool: ask_web_architect
  default_profile: balanced
  vague_requirement_profile: balanced
  complex_requirement_profile: deep_lite
  strongest_profile: deep

routing:
  default_non_execution_route: "web"
  codex_role: "executor"
  web_role: "tech_lead"
  auto_route_natural_language: true
  web_capacity_policy:
    estimated_weekly_strongest_quota: 100
    conserve_strongest: true
    strongest_only_for_2h_plus_problems: true
    prefer_current_standard_for_under_30min: true
    require_explicit_or_high_value_for_strongest: true
    use_strongest_for:
      - "2h_plus_deep_reasoning"
      - "patent_or_innovation_strategy"
      - "autonomous_driving_safety_critical_architecture"
      - "long_term_architecture_decision"
      - "multi_round_unresolved_failure"
      - "high_risk_final_review"
      - "cross_module_migration_strategy"
    avoid_strongest_for:
      - "simple_question"
      - "normal_architecture"
      - "routine_review"
      - "ordinary_debug"
      - "formatting"
      - "small_code_change"
      - "under_30min_problem"

project:
  allowed_extensions:
    - ".cpp"
    - ".hpp"
    - ".cc"
    - ".cxx"
    - ".h"
    - ".cu"
    - ".cuh"
    - ".py"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".md"
    - ".txt"
    - "CMakeLists.txt"
  ignore_paths:
    - ".git"
    - "build"
    - "log"
    - "data"
    - "weights"
    - "__pycache__"
  sensitive_patterns:
    - "*.bag"
    - "*.pcd"

web_adapter:
  enabled: true
  base_url: "https://chatgpt.com"
  profile_dir: ".chatgpt-web-browser"
  user_data_dir: ""
  executable_path: ""
  channel: "chrome"
  headless: false
  timeout_ms: 120000
  model_strategy:
    # Prefer the strongest capability currently available in ChatGPT Web.
    # If its quota is exhausted or the option is unavailable, try the next tier.
    # These are capability labels, not fixed model-version names.
    mode: "best_available"
    capability_order:
      - ["professional", "pro", "专业"]
      - ["very high", "extra high", "超高"]
      - ["high", "高级"]
      - ["balanced", "均衡"]
      - ["fast", "极速"]
    fallback_to_current_model: true
  fail_if_preferred_unavailable: false

browser_broker:
  enabled: true
  startup_timeout_seconds: 20
  request_timeout_seconds: 660
  idle_timeout_seconds: 1800
  state_dir: ""
  profiles:
    fast:
      description: "Simple questions and concise, low-latency responses"
      thinking_level: "fast"
    balanced:
      description: "Default Tech Lead analysis for normal architecture and under-30min problems"
      thinking_level: "auto"
    deep_lite:
      description: "Complex analysis with deeper reasoning and moderate latency"
      thinking_level: "deep"
    deep:
      description: "Strategic or high-risk work; request the strongest current Web reasoning"
      thinking_level: "deep"
    review:
      description: "Normal code review with balanced reasoning"
      thinking_level: "balanced"
    critical_review:
      description: "Critical code review; request the strongest current Web reasoning"
      thinking_level: "deep"
    debug:
      description: "Normal debugging with balanced reasoning"
      thinking_level: "balanced"
    deep_debug:
      description: "Complex root-cause analysis; request the strongest current Web reasoning"
      thinking_level: "deep"
  input_selectors:
    - "#prompt-textarea"
    - "textarea[data-testid='composer-tray-text-input']"
    - "textarea[placeholder*='Message']"
    - "textarea[placeholder*='Send a message']"
    - "div[contenteditable='true']"
  send_selectors:
    - "button[data-testid='send-button']"
    - "button[data-testid='send-button-annotation']"
    - "button:has-text('Send')"
    - "button[aria-label='Send prompt']"
    - "button[aria-label='Send message']"
  response_selectors:
    - "[data-message-author-role='assistant']"
    - "article[data-message-author-role='assistant']"
    - "article[data-testid='conversation-turn-2']"
    - "div[data-testid='markdown']"
    - "article"
  response_wait:
    response_deadline_seconds: 600
    settle_debounce_ms: 1200
    observer_poll_interval_ms: 250
    observer_healthcheck_seconds: 5
    user_turn_confirm_timeout_seconds: 20
    conversation_hydration_timeout_seconds: 30

conversation_reuse:
  # One ChatGPT Web conversation per local project by default. State contains
  # only a project hash and canonical conversation URL; never prompt text.
  enabled: true
  state_file: ""
  recover_once_on_definitive_invalid: true

browser_tabs:
  cleanup_before_query: true
  cleanup_after_query: true
  keep_latest_chatgpt_tabs: 0
  close_about_blank: true
  close_chatgpt_tabs: true
  max_tabs_warning_threshold: 5

api_adapter:
  # API mode requires an explicit provider model name; Web mode is model-neutral.
  model: ""
  temperature: 0.2
  max_tokens: 4096
  request_timeout_seconds: 60
  response_wait_seconds: 60

runtime:
  tool_timeout_seconds: 660
  web_query_timeout_seconds: 630
  browser_launch_timeout_seconds: 45
  auto_kill_stale_ai_chrome: false
  auto_remove_stale_lock: false

memory_file: ".bridge_memory.json"
