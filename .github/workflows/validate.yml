name: Validate delivery files

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate Python syntax
        shell: pwsh
        run: |
          python -m compileall -q server.py adapters core tools
      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem scripts/windows -File | Where-Object { $_.Extension -in '.ps1', '.psm1' } | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            $errors += $parseErrors
          }
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }
      - name: Check release exclusions
        shell: pwsh
        run: |
          $forbidden = @("config.yaml", "bridge_mcp.log", "bridge_launch_matrix.log")
          foreach ($name in $forbidden) {
            if (Test-Path -LiteralPath $name) { Write-Host "Local file present and ignored: $name" }
          }
  windows-install-smoke:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install through PowerShell bootstrap entry and verify
        shell: pwsh
        run: |
          $sandbox = Join-Path $env:RUNNER_TEMP "pro-bridge-powershell-bootstrap-smoke"
          $env:LOCALAPPDATA = Join-Path $sandbox "localappdata"
          $env:USERPROFILE = Join-Path $sandbox "userprofile"
          New-Item -ItemType Directory -Force -Path (Join-Path $env:USERPROFILE ".codex") | Out-Null
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts\windows\bootstrap.ps1 -Repository wly-ysu/web-bridge-codex -Ref main -NonInteractive -AcceptAiProfile -SkipBrowserLaunch
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & (Join-Path $env:LOCALAPPDATA "pro_bridge_codex\app\scripts\windows\verify-install.ps1")
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Install through CMD bootstrap entry and verify
        shell: pwsh
        run: |
          $sandbox = Join-Path $env:RUNNER_TEMP "pro-bridge-cmd-bootstrap-smoke"
          $env:LOCALAPPDATA = Join-Path $sandbox "localappdata"
          $env:USERPROFILE = Join-Path $sandbox "userprofile"
          New-Item -ItemType Directory -Force -Path (Join-Path $env:USERPROFILE ".codex") | Out-Null
          cmd /c scripts\windows\bootstrap.cmd -Repository wly-ysu/web-bridge-codex -Ref main -NonInteractive -AcceptAiProfile -SkipBrowserLaunch
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & (Join-Path $env:LOCALAPPDATA "pro_bridge_codex\app\scripts\windows\verify-install.ps1")
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
  validate-unix-delivery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate shared configuration utility
        run: python -m compileall -q deploy/common/configure_user.py
      - name: Validate Unix shell syntax
        run: |
          for script in scripts/unix/*.sh; do
            sh -n "$script"
          done
      - name: Run Linux container installation smoke test
        run: docker build --file tests/install/Dockerfile.linux --tag pro-bridge-linux-smoke .
  macos-install-smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run non-GUI macOS installation smoke test
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.codex" "$HOME/Applications/Google Chrome.app/Contents/MacOS"
          printf '#!/bin/sh\necho fake-chrome\n' > "$HOME/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
          chmod +x "$HOME/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"
          export XDG_DATA_HOME="$RUNNER_TEMP/pro-bridge-macos-data"
          sh scripts/unix/install.sh --non-interactive --accept-ai-profile --no-open-browser
          sh "$HOME/Library/Application Support/pro_bridge_codex/app/scripts/unix/doctor.sh"
