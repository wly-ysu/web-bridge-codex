name: Release Windows package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ($version -eq "") { $version = "dev" }
          ./scripts/windows/package.ps1 -Version $version
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packaging/output/pro_bridge_codex-windows-x64-*.zip
            packaging/output/SHA256SUMS.txt
