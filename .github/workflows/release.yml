name: Build native release packages

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: windows-latest, target: windows-x64 }
          - { runner: ubuntu-latest, target: linux-x64 }
          - { runner: macos-15-intel, target: macos-x64 }
          - { runner: macos-14, target: macos-arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - name: Build native one-folder archive
        run: |
          python -m pip install -r requirements.txt -r requirements-release.txt
          python -m unittest discover -s tests
          python scripts/release/build_artifact.py --target ${{ matrix.target }}
      - name: Install and probe Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sandbox = Join-Path $env:RUNNER_TEMP "web-bridge-native-artifact"
          $env:LOCALAPPDATA = Join-Path $sandbox "localappdata"; $env:USERPROFILE = Join-Path $sandbox "userprofile"; $env:CODEX_HOME = Join-Path $sandbox "codex"
          New-Item -ItemType Directory -Force -Path $env:CODEX_HOME | Out-Null
          $legacyConfig = Join-Path $env:LOCALAPPDATA "web-bridge-codex\config\config.yaml"
          New-Item -ItemType Directory -Force -Path (Split-Path $legacyConfig) | Out-Null
          Set-Content -LiteralPath $legacyConfig -Value 'workflow:`n  local_execution_prefix: "broken`nweb_adapter:`n  model_strategy:`n    preferred_models:`n      - "GPT-5.5"' -Encoding utf8
          & scripts/release/install-windows.ps1 -ArtifactPath "release-output/web-bridge-codex-windows-x64.zip" -ChromePath "$env:SystemRoot\System32\cmd.exe" -NonInteractive -AcceptAiProfile -AcceptManagedRuntimeReplacement -SkipBrowserLaunch
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $root = Join-Path $env:LOCALAPPDATA "web-bridge-codex"
          Set-Content -LiteralPath (Join-Path $root "config\config.yaml") -Value "broken: [`"yaml`"" -Encoding utf8
          & scripts/release/repair-windows.ps1 -ChromePath "$env:SystemRoot\System32\cmd.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python tests/release/test_mcp_tools_list.py (Join-Path $root "app\web-bridge-codex.exe") (Join-Path $root "config\config.yaml") (Join-Path $env:CODEX_HOME "config.toml")
          & (Join-Path $root "app\web-bridge-codex.exe") --broker-self-test --config (Join-Path $root "config\config.yaml")
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Install and probe Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          export HOME="$RUNNER_TEMP/web-bridge-native-home" XDG_DATA_HOME="$RUNNER_TEMP/web-bridge-native-data"
          mkdir -p "$HOME/.codex" "$RUNNER_TEMP/browser"
          printf '#!/bin/sh\nexit 0\n' > "$RUNNER_TEMP/browser/chrome"; chmod +x "$RUNNER_TEMP/browser/chrome"
          sh scripts/release/install-unix.sh --artifact "release-output/web-bridge-codex-${{ matrix.target }}.zip" --chrome-path "$RUNNER_TEMP/browser/chrome" --non-interactive --accept-ai-profile --no-open-browser
          python tests/release/test_mcp_tools_list.py "$XDG_DATA_HOME/web-bridge-codex/app/web-bridge-codex" "$XDG_DATA_HOME/web-bridge-codex/config/config.yaml" "$HOME/.codex/config.toml"
          "$XDG_DATA_HOME/web-bridge-codex/app/web-bridge-codex" --broker-self-test --config "$XDG_DATA_HOME/web-bridge-codex/config/config.yaml"
      - uses: actions/upload-artifact@v4
        with:
          name: web-bridge-codex-${{ matrix.target }}
          path: release-output/web-bridge-codex-${{ matrix.target }}.zip
          if-no-files-found: error
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: release-assets, merge-multiple: true }
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" release-assets/*.zip --clobber
